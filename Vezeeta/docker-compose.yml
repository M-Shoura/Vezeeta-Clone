version: "3.9"

services:

  # ──────────────────────────────────────────────
  # SQL Server 2022
  # ──────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: vezeeta_db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${DB_SA_PASSWORD}\" -Q \"SELECT 1\" -No"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  # ──────────────────────────────────────────────
  # Vezeeta MVC Application
  # ──────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vezeeta_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      # Connection string — uses the 'db' service name as host
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=VezeetaDb;User Id=sa;Password=${DB_SA_PASSWORD};Encrypt=True;TrustServerCertificate=True"
      # App
      App__BaseUrl: "${APP_BASE_URL}"
      # Email
      Email__Host: "${EMAIL_HOST}"
      Email__Port: "${EMAIL_PORT}"
      Email__From: "${EMAIL_FROM}"
      Email__Username: "${EMAIL_USERNAME}"
      Email__Password: "${EMAIL_PASSWORD}"
      # Google OAuth
      Authentication__Google__ClientId: "${GOOGLE_CLIENT_ID}"
      Authentication__Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
      # Facebook OAuth
      Authentication__Facebook__ClientId: "${FACEBOOK_CLIENT_ID}"
      Authentication__Facebook__ClientSecret: "${FACEBOOK_CLIENT_SECRET}"
      # Paymob
      Paymob__ApiKey: "${PAYMOB_API_KEY}"
      Paymob__IntegrationId: "${PAYMOB_INTEGRATION_ID}"
      Paymob__IframeId: "${PAYMOB_IFRAME_ID}"
      Paymob__Currency: "${PAYMOB_CURRENCY}"
    volumes:
      # Persist user-uploaded profile pictures across container restarts
      - uploads_data:/app/wwwroot/uploads/profiles

volumes:
  sqlserver_data:
  uploads_data:
